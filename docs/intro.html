// ─── ANIMAL SKULL PARAMETERS ────────────────────────────────────

const ANIMALS = [

const SPECIES_PARAMS = {

// ─── ELLIPSOID MATH ──────────────────────────────────────────────

function rayEllipsoid(ox, oy, oz, dx, dy, dz, e) {
  const rx = e.rx, ry = e.ry, rz = e.rz;
  const cx = e.cx, cy = e.cy, cz = e.cz;
  const ndx = dx / rx, ndy = dy / ry, ndz = dz / rz;
  const ocx = (ox - cx) / rx, ocy = (oy - cy) / ry, ocz = (oz - cz) / rz;
  const A = ndx*ndx + ndy*ndy + ndz*ndz;
  const B = 2 * (ndx*ocx + ndy*ocy + ndz*ocz);
  const C = ocx*ocx + ocy*ocy + ocz*ocz - 1;
  const disc = B*B - 4*A*C;
  if (disc < 0) return -1;
  const t1 = (-B + Math.sqrt(disc)) / (2*A);
  const t2 = (-B - Math.sqrt(disc)) / (2*A);
  if (t1 < 0 && t2 < 0) return -1;
  if (t1 < 0) return t2;
  if (t2 < 0) return t1;
  return Math.min(t1, t2);
}

function sphereTest(x, y, z, s) {
  const dx = x - s.cx, dy = y - s.cy, dz = z - s.cz;
  return dx*dx + dy*dy + dz*dz <= s.r * s.r;
}

function ellipsoidContains(x, y, z, e) {
  const dx = (x - e.cx) / e.rx;
  const dy = (y - e.cy) / e.ry;
  const dz = (z - e.cz) / e.rz;
  return dx*dx + dy*dy + dz*dz <= 1;
}

function isInsideSkull(x, y, z, p) {
  const inCranium = ellipsoidContains(x, y, z, p.cranium);
  const inSnout = ellipsoidContains(x, y, z, p.snout);
  const inJaw = ellipsoidContains(x, y, z, p.jaw);
  const inEye = sphereTest(x, y, z, p.lEye) || sphereTest(x, y, z, p.rEye);
  return (inCranium || inSnout || inJaw) && !inEye;
}

function getSkullRadius(dir, p) {
  const dx = dir.x, dy = dir.y, dz = dir.z;
  const r1 = rayEllipsoid(0, 0, 0, dx, dy, dz, p.cranium);
  const r2 = rayEllipsoid(0, 0, 0, dx, dy, dz, p.snout);
  const r3 = rayEllipsoid(0, 0, 0, dx, dy, dz, p.jaw);
  let r = Math.max(r1, r2, r3);

  const px = r * dx, py = r * dy, pz = r * dz;
  if (sphereTest(px, py, pz, p.lEye) || sphereTest(px, py, pz, p.rEye)) {
    const rEyeL = rayEllipsoid(0, 0, 0, dx, dy, dz, {
      cx: p.lEye.cx, cy: p.lEye.cy, cz: p.lEye.cz,
      rx: p.lEye.r, ry: p.lEye.r, rz: p.lEye.r
    });
    const rEyeR = rayEllipsoid(0, 0, 0, dx, dy, dz, {
      cx: p.rEye.cx, cy: p.rEye.cy, cz: p.rEye.cz,
      rx: p.rEye.r, ry: p.rEye.r, rz: p.rEye.r
    });
    const rEye = Math.max(rEyeL, rEyeR);
    if (rEye > 0 && rEye < r) r = rEye;
  }
  return r;
}

function getRandomDirection() {  
  const theta = 2 * Math.PI * Math.random();
  const phi = Math.acos(2 * Math.random() - 1);
  return new THREE.Vector3(
    Math.sin(phi) * Math.cos(theta),
    Math.cos(phi),
    Math.sin(phi) * Math.sin(theta)
  );
}

// ─── GENERATE PARTICLE SETS ──────────────────────────────────────

const PARTICLE_COUNT = 2000;
const directions = [];

for (let i = 0; i < PARTICLE_COUNT; i++) {
  directions.push(getRandomDirection());
}

function generateSkullPoints(speciesId) {
  const p = SPECIES_PARAMS[speciesId];
  const points = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const dir = directions[i];
    const r = getSkullRadius(dir, p) * (0.6 + 0.4 * Math.random());
    const x = r * dir.x, y = r * dir.y, z = r * dir.z;
    if (isInsideSkull(x, y, z, p)) {
      points.push(new THREE.Vector3(x, y, z));
    } else {
      let found = false;
      for (let attempt = 0; attempt < 20; attempt++) {
        const d2 = getRandomDirection();
        const r2 = getSkullRadius(d2, p) * (0.6 + 0.4 * Math.random());
        const px2 = r2 * d2.x, py2 = r2 * d2.y, pz2 = r2 * d2.z;
        if (isInsideSkull(px2, py2, pz2, p)) {
          points.push(new THREE.Vector3(px2, py2, pz2));
          found = true;
          break;
        }
      }
      if (!found) points.push(new THREE.Vector3(0.001, 0.001, 0.001));
    }
  }
  return points;
}

// ─── PRE-GENERATE ALL ANIMAL POINT SETS ─────────────────────────

const allPointSets = {};
for (const a of ANIMALS) {
  allPointSets[a.id] = generateSkullPoints(a.id);
}

// ─── BUILD SCENE OBJECTS ────────────────────────────────────────

const PARTICLE_SIZE = 0.035;
const CONN_THRESHOLD = 0.5;

const posArr = new Float32Array(PARTICLE_COUNT * 3);
const colArr = new Float32Array(PARTICLE_COUNT * 3);

const particleGeom = new THREE.BufferGeometry();
particleGeom.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
particleGeom.setAttribute('color', new THREE.BufferAttribute(colArr, 3));

const particleMat = new THREE.PointsMaterial({
  size: PARTICLE_SIZE,
  vertexColors: true,
  transparent: true,
  opacity: 1,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const particleSystem = new THREE.Points(particleGeom, particleMat);
scene.add(particleSystem);

// Pre-compute connections for each animal
function computeConnections(points, threshold) {
  const positions = [];
  const colors = [];
  for (let i = 0; i < points.length && positions.length < 12000; i++) {
    const pi = points[i];
    for (let j = i + 1; j < points.length && positions.length < 12000; j++) {
      const d = pi.distanceTo(points[j]);
      if (d < threshold) {
        positions.push(pi.x, pi.y, pi.z, points[j].x, points[j].y, points[j].z);
        const a = 1 - d / threshold;
        colors.push(0.42, 0.41, 0.57, a * 0.35, a * 0.32, a * 0.45);
      }
    }
  }
  return { positions, colors };
}

const allConnections = {};
for (const a of ANIMALS) {
  const pts = allPointSets[a.id];
  const subset = [];
  for (let i = 0; i < PARTICLE_COUNT; i += 2) {
    subset.push(pts[i]);
  }
  allConnections[a.id] = computeConnections(subset, CONN_THRESHOLD);
}

let activeConnections = allConnections[ANIMALS[0].id];
const connMat = new THREE.LineBasicMaterial({
  vertexColors: true,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});

function setupConnectionGeometry(data) {
  const geom = new THREE.BufferGeometry();
  if (data.positions.length > 0) {
    geom.setAttribute('position', new THREE.Float32BufferAttribute(data.positions, 3));
    geom.setAttribute('color', new THREE.Float32BufferAttribute(data.colors, 3));
  }
  return geom;
}

let connLines = new THREE.LineSegments(setupConnectionGeometry(activeConnections), connMat);
scene.add(connLines);

// ─── SIGNAL PARTICLES ────────────────────────────────────────────

const SIG_COUNT = 80;
const sigPosArr = new Float32Array(SIG_COUNT * 3);
const sigGeom = new THREE.BufferGeometry();
sigGeom.setAttribute('position', new THREE.BufferAttribute(sigPosArr, 3));
const sigMat = new THREE.PointsMaterial({

const sigMesh = new THREE.Points(sigGeom, sigMat);
scene.add(sigMesh);

const sigData = [];
for (let i = 0; i < SIG_COUNT; i++) {
  sigData.push({
    srcIdx: Math.floor(Math.random() * PARTICLE_COUNT),
    dstIdx: Math.floor(Math.random() * PARTICLE_COUNT),
    phase: Math.random(),

// ─── STAR FIELD ──────────────────────────────────────────────────

const starGeom = new THREE.BufferGeometry();
const starPos = new Float32Array(3000 * 3);
for (let i = 0; i < 3000; i++) {
  const r = 15 + Math.random() * 30;
  const th = Math.random() * 2 * Math.PI;
  const ph = Math.acos(2 * Math.random() - 1);
  starPos[i*3] = r * Math.sin(ph) * Math.cos(th);
  starPos[i*3+1] = r * Math.cos(ph) * 0.3;
  starPos[i*3+2] = r * Math.sin(ph) * Math.sin(th);
}
starGeom.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const stars = new THREE.Points(starGeom, new THREE.PointsMaterial({
  size: 0.04, color: 0x6B6A92, transparent: true, opacity: 0.3,

scene.add(stars);

// ─── GLOW HALO ───────────────────────────────────────────────────

const haloGeom = new THREE.SphereGeometry(0.01, 16, 16);
const haloMat = new THREE.MeshBasicMaterial({
  color: 0x6B6A92,
  transparent: true,
  opacity: 0.04,

const halo = new THREE.Mesh(haloGeom, haloMat);
halo.position.set(0.3, 0, 0);
scene.add(halo);

// ─── STATE ───────────────────────────────────────────────────────

let currentAnimalIdx = 0;
let targetAnimalIdx = 1;
let morphProgress = 0;
const morphSpeed = 0.008;
const dwellTime = 10;
const morphTime = 2.0;
let dwellTimer = 0;
let isMorphing = false;

let pointsB = allPointSets[ANIMALS[1].id];

function updateParticles(points, accentColor) {
  const pos = particleGeom.attributes.position.array;
  const col = particleGeom.attributes.color.array;

  const bounds = { xmin: Infinity, xmax: -Infinity, ymin: Infinity, ymax: -Infinity, zmin: Infinity, zmax: -Infinity };
  for (const p of points) {
    if (p.x < bounds.xmin) bounds.xmin = p.x;
    if (p.x > bounds.xmax) bounds.xmax = p.x;
    if (p.y < bounds.ymin) bounds.ymin = p.y;
    if (p.y > bounds.ymax) bounds.ymax = p.y;
    if (p.z < bounds.zmin) bounds.zmin = p.z;
    if (p.z > bounds.zmax) bounds.zmax = p.z;
  }
  const cx = (bounds.xmin + bounds.xmax) / 2;
  const cy = (bounds.ymin + bounds.ymax) / 2;
  const cz = (bounds.zmin + bounds.zmax) / 2;
  const maxR = Math.max(bounds.xmax - bounds.xmin, bounds.ymax - bounds.ymin, bounds.zmax - bounds.zmin) / 2;

  const baseCol = new THREE.Color(0xDEDBF3);
  const accCol = new THREE.Color(accentColor || 0xF5A623);

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = points[i];
    pos[i*3] = p.x - cx;
    pos[i*3+1] = (p.y - cy) * 0.95;
    pos[i*3+2] = p.z - cz;

    const dist = Math.sqrt((p.x-cx)**2 + (p.y-cy)**2 + (p.z-cz)**2) / maxR;
    const c = baseCol.clone().lerp(accCol, Math.pow(dist, 0.5) * 0.12);
    c.lerp(new THREE.Color(0x6B6A92), Math.random() * 0.2);
    col[i*3] = c.r;
    col[i*3+1] = c.g;
    col[i*3+2] = c.b;
  }
  particleGeom.attributes.position.needsUpdate = true;
  particleGeom.attributes.color.needsUpdate = true;
}

function switchConnections(id) {
  const data = allConnections[id];
  const newGeom = new THREE.BufferGeometry();
  if (data.positions.length > 0) {
    newGeom.setAttribute('position', new THREE.Float32BufferAttribute(data.positions, 3));
    newGeom.setAttribute('color', new THREE.Float32BufferAttribute(data.colors, 3));
  }
  scene.remove(connLines);
  connLines.geometry.dispose();
  connLines = new THREE.LineSegments(newGeom, connMat);
  scene.add(connLines);
  activeConnections = data;
}

function setAnimal(index) {
  const id = ANIMALS[index].id;
  const points = allPointSets[id];
  updateParticles(points, ANIMALS[index].color);
  switchConnections(id);
  document.getElementById('speciesLabel').textContent = ANIMALS[index].label;
  currentAnimalIdx = index;
}

// ─── MOUSE ───────────────────────────────────────────────────────

let mouseX = 0, mouseY = 0, tMouseX = 0, tMouseY = 0;
document.addEventListener('mousemove', (e) => {
  tMouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  tMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ─── RESIZE ──────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

// ─── ANIMATION ───────────────────────────────────────────────────

const clock = new THREE.Clock();
let elapsed = 0;

const tempVecA = new THREE.Vector3();

function animate() {
  const delta = Math.min(clock.getDelta(), 0.05);
  elapsed += delta;

  mouseX += (tMouseX - mouseX) * 0.035;
  mouseY += (tMouseY - mouseY) * 0.035;

  const orbitAngle = elapsed * 0.05;
  const camRadius = 7.5 + mouseX * 1.0;
  const camHeight = 1.5 + mouseY * 0.6;

  camera.position.x = camRadius * Math.cos(orbitAngle);
  camera.position.z = camRadius * Math.sin(orbitAngle);
  camera.position.y = camHeight + Math.sin(elapsed * 0.07) * 0.25;
  camera.lookAt(0, -0.2, 0);

  // ─── ANIMAL MORPHING ────────────────────────────────────────

  if (!isMorphing) {
    dwellTimer += delta;
    if (dwellTimer >= dwellTime) {
      isMorphing = true;
      morphProgress = 0;
      targetAnimalIdx = (currentAnimalIdx + 1) % ANIMALS.length;
      pointsB = allPointSets[ANIMALS[targetAnimalIdx].id];
    }
  }

  const currentPoints = allPointSets[ANIMALS[currentAnimalIdx].id];

  if (isMorphing) {
    morphProgress += delta / morphTime;
    if (morphProgress >= 1) {
      morphProgress = 1;
      isMorphing = false;
      dwellTimer = 0;
      currentAnimalIdx = targetAnimalIdx;
      switchConnections(ANIMALS[currentAnimalIdx].id);
      document.getElementById('speciesLabel').textContent = ANIMALS[currentAnimalIdx].label;
    }

    const ease = morphProgress < 0.5
      ? 2 * morphProgress * morphProgress
      : 1 - Math.pow(-2 * morphProgress + 2, 2) / 2;

    const turbulence = Math.sin(morphProgress * Math.PI) * 0.3;
    const scatter = Math.sin(morphProgress * Math.PI * 3) * 0.04;

    const pos = particleGeom.attributes.position.array;
    const col = particleGeom.attributes.color.array;

    const bounds = { xmin: Infinity, xmax: -Infinity, ymin: Infinity, ymax: -Infinity, zmin: Infinity, zmax: -Infinity };
    const allPts = currentPoints.map((p, i) => {
      const lerped = tempVecA.copy(p).lerp(pointsB[i], ease);
      const noise = Math.sin(p.x * 3 + morphProgress * 8 + i * 0.01) * scatter;
      const noiseY = Math.cos(p.y * 3 + morphProgress * 7 + i * 0.013) * scatter;
      const noiseZ = Math.sin(p.z * 3 + morphProgress * 9 + i * 0.017) * scatter;
      const pp = new THREE.Vector3(
        lerped.x + noise,
        lerped.y + noiseY,
        lerped.z + noiseZ
      );
      if (pp.x < bounds.xmin) bounds.xmin = pp.x;
      if (pp.x > bounds.xmax) bounds.xmax = pp.x;
      if (pp.y < bounds.ymin) bounds.ymin = pp.y;
      if (pp.y > bounds.ymax) bounds.ymax = pp.y;
      if (pp.z < bounds.zmin) bounds.zmin = pp.z;
      if (pp.z > bounds.zmax) bounds.zmax = pp.z;
      return pp;
    });
    const cx = (bounds.xmin + bounds.xmax) / 2;
    const cy = (bounds.ymin + bounds.ymax) / 2;
    const cz = (bounds.zmin + bounds.zmax) / 2;
    const maxR = Math.max(bounds.xmax - bounds.xmin, bounds.ymax - bounds.ymin, bounds.zmax - bounds.zmin) / 2;

    const baseCol = new THREE.Color(0xDEDBF3);
    const targetCol = new THREE.Color(ANIMALS[targetAnimalIdx].color);
    const fromCol = new THREE.Color(ANIMALS[currentAnimalIdx].color);
    const flashCol = new THREE.Color(0xF5A623);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = allPts[i];
      pos[i*3] = p.x - cx;
      pos[i*3+1] = (p.y - cy) * 0.95;
      pos[i*3+2] = p.z - cz;

      const dist = Math.sqrt((p.x-cx)**2 + (p.y-cy)**2 + (p.z-cz)**2) / Math.max(maxR, 0.01);
      const targetC = baseCol.clone().lerp(targetCol, 0.06 + Math.pow(dist, 0.5) * 0.10);
      const fromC = baseCol.clone().lerp(fromCol, 0.06 + Math.pow(dist, 0.5) * 0.10);
      const c = fromC.lerp(targetC, ease);
      const flash = Math.sin(morphProgress * Math.PI) * 0.3;
      c.lerp(flashCol, flash * (0.5 + Math.sin(i * 0.5) * 0.5));
      c.lerp(new THREE.Color(0x6B6A92), 0.1);
      col[i*3] = c.r;
      col[i*3+1] = c.g;
      col[i*3+2] = c.b;
    }
    particleGeom.attributes.position.needsUpdate = true;
    particleGeom.attributes.color.needsUpdate = true;

    document.getElementById('speciesLabel').textContent = ANIMALS[morphProgress < 0.5 ? currentAnimalIdx : targetAnimalIdx].label;
  }

  // ─── SIGNAL PARTICLES ────────────────────────────────────────

  const pos2 = particleGeom.attributes.position.array;
  const sigPos = sigGeom.attributes.position.array;

  for (let i = 0; i < SIG_COUNT; i++) {
    const sd = sigData[i];
    sd.phase += delta * sd.speed * 0.08;
    if (sd.phase > 1) {
      sd.phase = 0;
      sd.srcIdx = Math.floor(Math.random() * PARTICLE_COUNT);
      sd.dstIdx = Math.floor(Math.random() * PARTICLE_COUNT);
    }
    const p = sd.phase;
    const easeP = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;
    const i3 = sd.srcIdx * 3;
    const j3 = sd.dstIdx * 3;
    sigPos[i*3] = pos2[i3] + (pos2[j3] - pos2[i3]) * easeP;
    sigPos[i*3+1] = pos2[i3+1] + (pos2[j3+1] - pos2[i3+1]) * easeP;
    sigPos[i*3+2] = pos2[i3+2] + (pos2[j3+2] - pos2[i3+2]) * easeP;
  }
  sigGeom.attributes.position.needsUpdate = true;
  sigMat.opacity = 0.4 + Math.sin(elapsed * 0.3) * 0.2;

  // ─── AMBIENT MOVEMENT ────────────────────────────────────────

  const breathe = 1 + Math.sin(elapsed * 0.2) * 0.006;
  particleSystem.scale.setScalar(breathe);
  connLines.scale.setScalar(breathe);
  connLines.material.opacity = 0.35 + Math.sin(elapsed * 0.12) * 0.15;

  stars.rotation.y = elapsed * 0.002;

  halo.scale.setScalar(1 + Math.sin(elapsed * 0.3) * 0.1);
  haloMat.opacity = 0.02 + Math.sin(elapsed * 0.2) * 0.015;

  // ─── RENDER ──────────────────────────────────────────────────

  composer.render();
  requestAnimationFrame(animate);
}

// ─── INIT ────────────────────────────────────────────────────────

setAnimal(0);
animate();

console.log('SKAL4R — Neural Skull Morphing Engine v1.0');
</script>
